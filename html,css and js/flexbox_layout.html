<!DOCTYPE html>
<html lang="en">
<!--flex box, vertical axis = cross axis, horizontal axis = main axis-->

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            /* body- parent container or element, it will show flex in horizontal direction */
            display: flex;
            /*flex-direction: column; ----
            /* row - horizontal | column - vertical */
            /* in column direction main axis is vertical and cross axis is horizontal */
            justify-content: space-evenly;
            /* justify-content: flex-start- left| flex-end -right | center | space-between | space-around | space-evenly */
            align-items: flex-start;
            /* align-items: flex-start -top | flex-end -bottom | center | stretch | baseline */
            border: 2px solid black;
            min-height: 500px;
            flex-wrap: wrap;
            align-content: space-evenly;


        }

        /*flexible way of arranging items in a container*/
        .box {
            width: 100px;
            height: 100px;
            background-color: rgb(250, 187, 135);
            font-size: 2rem;
            /* 2rem means 2 times the root element's font size */
            border: 1.5px solid black;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #box1 {
            flex: 2 2;
            /*first is flex grow, second is flex shrink*/
            align-self: center;
        }
    </style>
</head>

<body>
    <div id="box1" class="box">1 </div><!--div.box*5-->
    <div class="box">2</div>
    <div class="box">3</div>
    <div class="box">4</div>
    <div class="box">5</div>
</body>

</html>

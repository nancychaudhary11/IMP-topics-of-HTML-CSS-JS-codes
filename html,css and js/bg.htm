<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        table {
            width: 100%;
            height: 100%;
            border-collapse: collapse;

        }
    </style>
</head>

<body>
    <table border="0" cellpadding="10px">

        <tr>

            <td>
                <img src="img pic.jpg">
                <ul type="square">
                    <li>HTML</li>
                    <li>CSS</li>
                    <li>JS</li>
                </ul>

            </td>
            <td style="background-color:green;">
                <ul type="circle">
                    <li>Nancy</li>
                    <li>John</li>
                    <li>Shreya</li>
                </ul>
            </td>

        </tr>

        <tr>

            <td style="background-color:blue;">
                <ol type="A">
                    <li>HTML</li>
                    <li>CSS</li>
                    <li>JS</li>
                </ol>
            </td>
            <td><img src="img pic.jpg">
                <ol type="a">
                    <li>Nancy</li>
                    <li>John</li>
                    <li>Shreya</li>
                </ol>
            </td>

        </tr>

    </table>
</body>

</html>

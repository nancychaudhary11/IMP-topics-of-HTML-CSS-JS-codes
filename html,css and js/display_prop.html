<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .para1,
        .para2 {
            border: 2dvb solid lightgreen;
            /*dvb= device viewport block*/
            display: inline-block;
            /* dispaly:inline;
             in inline u cant set h and w property but in inline-block u can set h and w */
            height: 100px;
            width: 200px;
        }

        span {
            display: inline;
            border: 2px solid blue;
            height: 100px;
            width: 200px;
            /* here, there no effect while using inline with display of h, w both */
        }
    </style>
</head>

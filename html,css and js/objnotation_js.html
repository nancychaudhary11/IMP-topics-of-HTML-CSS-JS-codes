<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>object</title>
</head>

<body>
    <script>
        let obj = {
            name: "John",
            age: 30,
            city: "New York"
        }
        console.log(obj.name); // Accessing property using dot notation
        console.log(obj["age"]); // Accessing property using bracket notation

        //difference between dot notation and bracket notation
        let value = "age"
        console.log(obj[value]); // Accessing property using variable with bracket notation
        console.log(obj.value); // it gives undefined because there is no property named 'value'
    </script>

</body>

</html>

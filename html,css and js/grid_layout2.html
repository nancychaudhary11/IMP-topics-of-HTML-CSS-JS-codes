<!DOCTYPE html>
<html lang="en">
<!-- Using of grid areas in layout-->

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid 2</title>
    <style>
        .container {
            height: 90vh;
            display: grid;
            grid-template-rows: 1fr 3fr 1fr;
            grid-template-columns: 1fr 3fr 1fr;
            /* can also written as -- grid-template-rows: auto 1fr auto; */
            gap: 8px 5px;
            /* gap between rows and columns, first gives gap in rows and second gives gap in cols  */


            grid-template-areas: "header header header"
                /* first row */
                "sidebar main-content navbar"
                /* second row with 3 columns */

                "footer footer footer";
            /* third row with 3 columns of footer will span all 3 cols */
        }

        .box {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: larger;
        }

        .header {
            border: 4px solid black;
            background-color: lightgreen;
            grid-area: header;

        }

        .footer {
            border: 4px solid black;
            background-color: lightgreen;
            grid-area: footer;
        }

        .sidebar {
            border: 4px solid black;
            background-color: yellowgreen;
            grid-area: sidebar;
        }

        .main-content {
            border: 4px solid black;
            background-color: #483c3c;
            grid-area: main-content;
        }

        .navbar {
            border: 4px solid black;
            background-color: beige;
            grid-area: navbar;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header box">Header</div>
        <div class="sidebar box">Sidebar</div>
        <div class="main-content box">Main Content</div>
        <div class="navbar box">Navbar</div>
        <div class="footer box">Footer</div>
    </div>

</body>

</html>
